<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interactive Split Auth</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="layout">
    <section class="art-panel" aria-label="Interactive geometric characters">
      <svg id="scene" class="scene" viewBox="0 0 620 620" role="img" aria-label="Three colorful geometric characters with animated eyes">
        <rect x="0" y="0" width="620" height="620" rx="32" fill="#f7efe5"></rect>

        <g class="character" transform="translate(68 106)">
          <rect x="0" y="0" width="164" height="246" rx="26" fill="#8b5cf6"></rect>
          <g class="open-eyes">
            <g class="eye" data-radius="9">
              <circle class="sclera" cx="52" cy="82" r="20" fill="#ffffff"></circle>
              <circle class="pupil" cx="52" cy="82" r="7.5" fill="#101010"></circle>
            </g>
            <g class="eye" data-radius="9">
              <circle class="sclera" cx="114" cy="82" r="20" fill="#ffffff"></circle>
              <circle class="pupil" cx="114" cy="82" r="7.5" fill="#101010"></circle>
            </g>
          </g>
          <g class="closed-eyes">
            <path d="M 34 84 Q 52 96 70 84" class="closed-eye-path"></path>
            <path d="M 96 84 Q 114 96 132 84" class="closed-eye-path"></path>
          </g>
          <g class="mouth">
            <path d="M 62 140 L 102 140" class="mouth-neutral"></path>
            <path d="M 62 140 Q 82 160 102 140" class="mouth-smile"></path>
            <path d="M 62 150 Q 82 132 102 150" class="mouth-sad"></path>
          </g>
        </g>

        <g class="character" transform="translate(278 204)">
          <path d="M 0 126 A 126 126 0 0 1 252 126 L 252 188 L 0 188 Z" fill="#fb923c"></path>
          <g class="open-eyes">
            <g class="eye" data-radius="9">
              <circle class="sclera" cx="90" cy="94" r="19" fill="#ffffff"></circle>
              <circle class="pupil" cx="90" cy="94" r="7" fill="#101010"></circle>
            </g>
            <g class="eye" data-radius="9">
              <circle class="sclera" cx="162" cy="94" r="19" fill="#ffffff"></circle>
              <circle class="pupil" cx="162" cy="94" r="7" fill="#101010"></circle>
            </g>
          </g>
          <g class="closed-eyes">
            <path d="M 72 96 Q 90 108 108 96" class="closed-eye-path"></path>
            <path d="M 144 96 Q 162 108 180 96" class="closed-eye-path"></path>
          </g>
          <g class="mouth">
            <path d="M 108 146 L 144 146" class="mouth-neutral"></path>
            <path d="M 108 146 Q 126 164 144 146" class="mouth-smile"></path>
            <path d="M 108 156 Q 126 138 144 156" class="mouth-sad"></path>
          </g>
        </g>

        <g class="character" transform="translate(180 408)">
          <rect x="0" y="0" width="260" height="136" rx="20" fill="#facc15"></rect>
          <g class="open-eyes">
            <g class="eye" data-radius="8">
              <circle class="sclera" cx="98" cy="58" r="17" fill="#ffffff"></circle>
              <circle class="pupil" cx="98" cy="58" r="6.5" fill="#101010"></circle>
            </g>
            <g class="eye" data-radius="8">
              <circle class="sclera" cx="162" cy="58" r="17" fill="#ffffff"></circle>
              <circle class="pupil" cx="162" cy="58" r="6.5" fill="#101010"></circle>
            </g>
          </g>
          <g class="closed-eyes">
            <path d="M 82 60 Q 98 72 114 60" class="closed-eye-path"></path>
            <path d="M 146 60 Q 162 72 178 60" class="closed-eye-path"></path>
          </g>
          <g class="mouth">
            <path d="M 112 96 L 148 96" class="mouth-neutral"></path>
            <path d="M 112 96 Q 130 112 148 96" class="mouth-smile"></path>
            <path d="M 112 104 Q 130 88 148 104" class="mouth-sad"></path>
          </g>
        </g>
      </svg>
    </section>

    <section class="form-panel">
      <article class="card">
        <h1>Welcome back!</h1>
        <p class="sub">Register first, then log in using email or phone.</p>

        <div class="view-switch" role="tablist" aria-label="Auth views">
          <button id="tab-register" class="tab active" type="button" data-view="register">Register</button>
          <button id="tab-login" class="tab" type="button" data-view="login">Login</button>
        </div>

        <section id="register-view" class="auth-view active" aria-label="Register view">
          <form id="register-form" novalidate>
            <label for="full-name">Full Name</label>
            <input id="full-name" type="text" placeholder="Your full name" autocomplete="name" required>

            <label for="reg-phone">Phone Number</label>
            <input id="reg-phone" type="tel" placeholder="10 digit phone number" autocomplete="tel" inputmode="numeric" maxlength="10" required>

            <label for="reg-email">Email</label>
            <input id="reg-email" type="email" placeholder="you@example.com" autocomplete="email" required>

            <label for="reg-password">Password</label>
            <input id="reg-password" type="password" placeholder="Create a strong password" autocomplete="new-password" required>
            <div class="strength-wrap" aria-live="polite">
              <div id="strength-bar" class="strength-bar"></div>
              <p id="strength-text" class="strength-text">Strength: -</p>
            </div>

            <button type="submit" class="btn btn-primary">Create Account</button>
          </form>
        </section>

        <section id="login-view" class="auth-view" aria-label="Login view">
          <form id="email-login-form" class="method-form active" novalidate>
            <label for="login-email">Email</label>
            <input id="login-email" type="email" placeholder="you@example.com" autocomplete="email">

            <label for="login-password">Password</label>
            <input id="login-password" type="password" placeholder="Enter your password" autocomplete="current-password">
            <label class="remember" for="remember-me">
              <input id="remember-me" type="checkbox">
              <span>Remember me on this device</span>
            </label>

            <button type="submit" class="btn btn-primary">Log in</button>
          </form>
          <button id="forgot-toggle" type="button" class="forgot-link">Forgot password?</button>

          <form id="forgot-form" class="forgot-form hidden" novalidate>
            <label for="forgot-email">Registered Email</label>
            <input id="forgot-email" type="email" placeholder="you@example.com" autocomplete="email">

            <label for="forgot-phone">Registered Phone Number</label>
            <input id="forgot-phone" type="tel" placeholder="10 digit phone number" autocomplete="tel" inputmode="numeric" maxlength="10">

            <label for="forgot-password">New Password</label>
            <input id="forgot-password" type="password" placeholder="Enter new password" autocomplete="new-password">

            <label for="forgot-confirm-password">Confirm New Password</label>
            <input id="forgot-confirm-password" type="password" placeholder="Re-enter new password" autocomplete="new-password">

            <button type="submit" class="btn btn-secondary">Reset Password</button>
          </form>

          <button type="button" class="btn btn-google" aria-label="Log in with Google">
            <svg class="google-icon" viewBox="0 0 24 24" aria-hidden="true">
              <path fill="#EA4335" d="M12 10.2v3.9h5.5c-.2 1.3-1.5 3.9-5.5 3.9-3.3 0-6-2.8-6-6.2s2.7-6.2 6-6.2c1.9 0 3.2.8 3.9 1.5l2.7-2.7C17 2.7 14.8 1.8 12 1.8 6.8 1.8 2.6 6.2 2.6 11.8S6.8 21.8 12 21.8c6.9 0 9.1-4.9 9.1-7.4 0-.5 0-.9-.1-1.2z"/>
              <path fill="#34A853" d="M2.6 11.8c0 1.8.6 3.5 1.7 4.8l3-2.4c-.4-.7-.7-1.5-.7-2.4s.2-1.7.7-2.4l-3-2.4c-1.1 1.3-1.7 3-1.7 4.8z"/>
              <path fill="#4A90E2" d="M12 21.8c2.8 0 5.2-.9 6.9-2.6l-3.3-2.7c-.9.6-2 1-3.6 1-2.6 0-4.8-1.8-5.6-4.2l-3 2.3c1.7 3.6 5.2 6.2 8.6 6.2z"/>
              <path fill="#FBBC05" d="M6.4 13.3c-.2-.5-.3-1-.3-1.5s.1-1 .3-1.5l-3-2.3c-.6 1.2-.9 2.4-.9 3.8s.3 2.6.9 3.8z"/>
            </svg>
            Log in with Google
          </button>
        </section>

        <p id="status" class="status" aria-live="polite"></p>
        <div id="auth-actions" class="auth-actions hidden">
          <button id="logout-btn" type="button" class="btn btn-secondary">Log out</button>
        </div>
      </article>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
